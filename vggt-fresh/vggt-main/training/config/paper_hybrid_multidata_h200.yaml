defaults:
  - default
  - _self_

# Stage 2: Mamba2 4개 (stage1 수렴 확인 후 이행)
# stage1 checkpoint에서 resume
exp_name: paper_hybrid_multidata_h200
num_workers: 8
max_img_per_gpu: 96
limit_train_batches: 50000
limit_val_batches: 200
val_epoch_freq: 99999
max_epochs: 20

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: 8
      img_nums: [8, 8]
      max_img_per_gpu: ${max_img_per_gpu}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /data/vggt_kimi_files/VGGT-Dataset
          CO3D_ANNOTATION_DIR: /root/co3d_annotations
          min_num_images: 8
          len_train: 200000
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /data/vggt_kimi_files/VGGT-Dataset/DL3DV-10K
          CO3D_ANNOTATION_DIR: /root/co3d_annotations
          min_num_images: 8
          len_train: 100000
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: 48
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: 8
      img_nums: [8, 8]
      max_img_per_gpu: 48
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          CO3D_DIR: /data/vggt_kimi_files/VGGT-Dataset
          CO3D_ANNOTATION_DIR: /root/co3d_annotations
          min_num_images: 8
          len_test: 10000

checkpoint:
  save_dir: /root/vggt_paper_hybrid_checkpoints
  resume_checkpoint_path: /root/vggt_hybrid_stage1_checkpoints/checkpoint.pt
  save_freq: 1
  save_freq_steps: 5000
  strict: false

logging:
  log_dir: /root/vggt_paper_hybrid_logs
  log_freq: 10

model:
  _target_: vggt.models.vggt.VGGT
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  halo_ratio: 0
  keep_global_attn_indices: null
  # Mamba2 4개: 앞쪽 집중, 마지막 10개 global layer는 전부 attention 유지
  replace_global_with_mamba2_indices: [3, 6, 9, 13]
  mamba2_d_state: 16
  mamba2_d_conv: 4
  mamba2_expand: 2
  mamba_mlp_ratio: 2.0
  enable_camera: true
  enable_depth: true
  enable_point: false
  enable_track: false

optim:
  frozen_module_names: []
  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05
  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
